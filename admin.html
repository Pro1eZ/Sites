<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrailRig Admin</title>
    <style>
        :root {
            --bg: #000;
            --bg2: #1c1c1e;
            --bg3: #2c2c2e;
            --border: #3a3a3c;
            --text: #f2f2f7;
            --secondary: #aeaeb2;
            --purple: #bf5af2;
            --green: #30d158;
            --yellow: #ffd60a;
            --red: #ff453a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }

        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 16px 32px; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px); z-index: 10;
        }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1rem; text-decoration: none; color: inherit; }
        .nav-logo img { width: 28px; height: 28px; border-radius: 7px; }
        .nav-tag { font-size: 0.7rem; font-weight: 700; background: rgba(191,90,242,0.2); color: var(--purple); padding: 2px 8px; border-radius: 6px; }

        .container { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 6px; }
        .subtitle { color: var(--secondary); font-size: 0.95rem; margin-bottom: 40px; }

        /* Auth gate */
        #auth-gate { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; padding: 32px; max-width: 400px; }
        #auth-gate h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
        #auth-gate p { color: var(--secondary); font-size: 0.88rem; margin-bottom: 20px; }
        input[type=password] {
            width: 100%; background: var(--bg3); border: 1px solid var(--border);
            border-radius: 10px; padding: 10px 14px; color: var(--text);
            font-size: 0.95rem; outline: none; margin-bottom: 12px;
        }
        input[type=password]:focus { border-color: var(--purple); }

        button {
            background: var(--purple); color: #fff; border: none; border-radius: 10px;
            padding: 10px 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.85; }
        button:disabled { opacity: 0.4; cursor: default; }
        button.secondary { background: var(--bg3); color: var(--text); }
        button.danger { background: rgba(255,69,58,0.2); color: var(--red); }

        .auth-error { color: var(--red); font-size: 0.83rem; margin-top: 8px; }

        /* Dashboard */
        #dashboard { display: none; }
        .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase; color: var(--purple); margin-bottom: 12px; margin-top: 32px; }
        .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 12px; overflow: hidden; }
        .card-row { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); gap: 12px; }
        .card-row:last-child { border-bottom: none; }
        .card-label { font-size: 0.95rem; font-weight: 600; }
        .card-sub { color: var(--secondary); font-size: 0.8rem; margin-top: 3px; }
        .card-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

        .badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; white-space: nowrap; }
        .badge::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .badge-green { background: rgba(48,209,88,0.15); color: var(--green); }
        .badge-yellow { background: rgba(255,214,10,0.15); color: var(--yellow); }
        .badge-red { background: rgba(255,69,58,0.15); color: var(--red); }
        .badge-gray { background: var(--bg3); color: var(--secondary); }

        .result-box { background: var(--bg3); border-radius: 10px; padding: 12px 16px; font-size: 0.83rem; color: var(--secondary); margin-top: 10px; font-family: monospace; white-space: pre-wrap; word-break: break-all; }
        .result-ok { color: var(--green); }
        .result-err { color: var(--red); }

        .logout-row { text-align: right; margin-top: 40px; }
    </style>
</head>
<body>
<nav>
    <a href="index.html" class="nav-logo">
        <img src="trailrig-logo.png" alt="TrailRig">
        TrailRig
    </a>
    <span class="nav-tag">ADMIN</span>
</nav>

<div class="container">
    <h1>Admin Dashboard</h1>
    <p class="subtitle">Manage feeds, stores, and backend configuration.</p>

    <!-- Auth gate -->
    <div id="auth-gate">
        <h2>Enter Admin Token</h2>
        <p>This dashboard is restricted. Enter your ADMIN_TOKEN to continue.</p>
        <input type="password" id="token-input" placeholder="Admin token" autocomplete="off">
        <button id="auth-btn" onclick="authenticate()">Unlock</button>
        <p class="auth-error" id="auth-error"></p>
    </div>

    <!-- Dashboard (shown after auth) -->
    <div id="dashboard">

        <div class="section-title">System Status</div>
        <div class="card" id="status-card">
            <div class="card-row"><div class="card-label">Loading…</div></div>
        </div>

        <div class="section-title">Feed Management</div>
        <div class="card">
            <div class="card-row">
                <div>
                    <div class="card-label">bike-components.de</div>
                    <div class="card-sub" id="feed-sub">Checking…</div>
                </div>
                <div class="card-right">
                    <button id="sync-btn" onclick="syncFeed()">Sync now</button>
                </div>
            </div>
        </div>
        <div class="result-box" id="sync-result" style="display:none"></div>

        <div class="section-title">Stores</div>
        <div class="card" id="stores-card">
            <div class="card-row"><div class="card-label">Loading…</div></div>
        </div>

        <div class="logout-row">
            <button class="secondary" onclick="logout()">Log out</button>
        </div>
    </div>
</div>

<script>
const API = "https://api.trailrig.app";
let token = "";

function fmt(ms) {
    if (!ms) return "—";
    return new Date(ms).toLocaleString("en-GB", {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit", timeZoneName: "short"
    });
}

function badge(text, type) {
    const span = document.createElement("span");
    span.className = "badge badge-" + type;
    span.textContent = text;
    return span;
}

async function authenticate() {
    const input = document.getElementById("token-input");
    const err = document.getElementById("auth-error");
    const btn = document.getElementById("auth-btn");
    const t = input.value.trim();
    if (!t) { err.textContent = "Token is required."; return; }

    btn.disabled = true;
    btn.textContent = "Checking…";
    err.textContent = "";

    try {
        const res = await fetch(API + "/v1/status");
        if (!res.ok) throw new Error("API unreachable");
        // Verify token works by calling a token-gated endpoint
        const check = await fetch(API + "/v1/admin/sync-awin?token=" + encodeURIComponent(t) + "&dry=1");
        // sync-awin doesn't support dry run — a 401 means bad token, anything else means token is valid
        if (check.status === 401) {
            err.textContent = "Invalid token.";
            btn.disabled = false;
            btn.textContent = "Unlock";
            return;
        }
        token = t;
        sessionStorage.setItem("adminToken", t);
        showDashboard();
    } catch {
        err.textContent = "Could not reach the API. Check your connection.";
        btn.disabled = false;
        btn.textContent = "Unlock";
    }
}

function showDashboard() {
    document.getElementById("auth-gate").style.display = "none";
    document.getElementById("dashboard").style.display = "block";
    loadStatus();
}

function logout() {
    token = "";
    sessionStorage.removeItem("adminToken");
    document.getElementById("auth-gate").style.display = "block";
    document.getElementById("dashboard").style.display = "none";
    document.getElementById("token-input").value = "";
    document.getElementById("auth-error").textContent = "";
}

async function loadStatus() {
    try {
        const res = await fetch(API + "/v1/status");
        const data = await res.json();

        // Status card
        const card = document.getElementById("status-card");
        card.textContent = "";
        const rows = [
            ["Backend", data.environment || "—", data.status === "ok" ? badge("OK", "green") : badge("Degraded", "yellow")],
            ["KV Storage", "SEARCH_CACHE binding", badge(data.kvAvailable ? "Available" : "Unavailable", data.kvAvailable ? "green" : "red")],
        ];
        for (const [lbl, sub, b] of rows) {
            const row = document.createElement("div");
            row.className = "card-row";
            const left = document.createElement("div");
            const l = document.createElement("div"); l.className = "card-label"; l.textContent = lbl;
            const s = document.createElement("div"); s.className = "card-sub"; s.textContent = sub;
            left.append(l, s);
            const right = document.createElement("div"); right.className = "card-right"; right.append(b);
            row.append(left, right);
            card.append(row);
        }

        // Feed sub-label
        const deFeed = data.feeds && data.feeds.bikeComponents_de;
        if (deFeed && deFeed.synced) {
            const count = deFeed.count ? deFeed.count.toLocaleString() + " products · " : "";
            document.getElementById("feed-sub").textContent = count + "Last synced: " + fmt(deFeed.synced);
        } else {
            document.getElementById("feed-sub").textContent = "Never synced";
        }

        // Stores card
        const storeCard = document.getElementById("stores-card");
        storeCard.textContent = "";
        if (data.stores && data.stores.length) {
            for (const s of data.stores) {
                const row = document.createElement("div");
                row.className = "card-row";
                const left = document.createElement("div");
                const l = document.createElement("div"); l.className = "card-label"; l.textContent = s.label;
                const sub = document.createElement("div"); sub.className = "card-sub"; sub.textContent = s.id;
                left.append(l, sub);
                const right = document.createElement("div"); right.className = "card-right";
                right.append(badge(s.enabled ? "Enabled" : "Disabled", s.enabled ? "green" : "gray"));
                row.append(left, right);
                storeCard.append(row);
            }
        } else {
            const row = document.createElement("div");
            row.className = "card-row";
            const l = document.createElement("div"); l.className = "card-label"; l.textContent = "No stores configured";
            row.append(l);
            storeCard.append(row);
        }
    } catch {
        document.getElementById("status-card").textContent = "Failed to load status.";
    }
}

async function syncFeed() {
    const btn = document.getElementById("sync-btn");
    const result = document.getElementById("sync-result");
    btn.disabled = true;
    btn.textContent = "Syncing…";
    result.style.display = "none";
    result.className = "result-box";

    try {
        const res = await fetch(API + "/v1/admin/sync-awin?token=" + encodeURIComponent(token));
        const data = await res.json();
        result.style.display = "block";
        if (res.ok && data.ok) {
            result.classList.add("result-ok");
            result.textContent = "✓ Sync complete\nProducts: " + (data.count || "—") + "\nNote: " + (data.note || "—");
            loadStatus();
        } else {
            result.classList.add("result-err");
            result.textContent = "✗ Sync failed\n" + JSON.stringify(data, null, 2);
        }
    } catch (e) {
        result.style.display = "block";
        result.classList.add("result-err");
        result.textContent = "✗ Request failed: " + e.message;
    }

    btn.disabled = false;
    btn.textContent = "Sync now";
}

// Restore session
const saved = sessionStorage.getItem("adminToken");
if (saved) { token = saved; showDashboard(); }

document.getElementById("token-input").addEventListener("keydown", e => {
    if (e.key === "Enter") authenticate();
});
</script>
</body>
</html>
